<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1A3A5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ricettario">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Il Mio Ricettario</title>
<style>
:root {
  --navy:#1A3A5C; --navy-bg:#D6E4F0;
  --green:#1E8449; --green-bg:#D5F5E3;
  --amber:#854F0B; --amber-bg:#FEF9E7;
  --purple:#3C3489; --purple-bg:#EEEDFE;
  --teal:#0F6E56; --teal-bg:#E1F5EE;
  --coral:#993C1D; --coral-bg:#FAECE7;
  --hiit:#185FA5; --hiit-bg:#EBF5FB;
  --gray:#555; --light:#F8F9FA;
  --radius:12px; --radius-sm:8px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f2f5;color:#1a1a1a;min-height:100vh;padding-bottom:calc(68px + var(--safe-bottom))}

/* TOP BAR */
.topbar{position:sticky;top:0;z-index:100;background:#1A3A5C;color:#fff;padding:14px 16px 12px;display:flex;align-items:center;gap:12px}
.topbar-back{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px;line-height:1}
.topbar-title{font-size:17px;font-weight:600;flex:1}
.topbar-sub{font-size:11px;opacity:.75;margin-top:2px}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:#fff;border-top:1px solid #e0e0e0;display:flex;padding-bottom:var(--safe-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;cursor:pointer;border:none;background:none;font-size:10px;color:#888;transition:color .15s}
.nav-item.active{color:#1A3A5C}
.nav-item svg{width:22px;height:22px;fill:currentColor}

/* SCREENS */
.screen{display:none;padding:0}
.screen.active{display:block}

/* HOME */
.home-header{background:#1A3A5C;color:#fff;padding:20px 16px 24px}
.home-header h1{font-size:22px;font-weight:700;margin-bottom:4px}
.home-header p{font-size:13px;opacity:.8}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px}
.stat-card{background:#fff;border-radius:var(--radius-sm);padding:12px;text-align:center;border:1px solid #eee}
.stat-num{font-size:24px;font-weight:700;color:#1A3A5C}
.stat-label{font-size:11px;color:#888;margin-top:2px}
.section-title{font-size:13px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;padding:16px 16px 8px}
.meal-nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 16px}
.meal-nav-btn{border-radius:var(--radius);padding:16px 14px;border:none;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:4px}
.meal-nav-btn .meal-time{font-size:11px;opacity:.7;font-weight:500}
.meal-nav-btn .meal-name{font-size:15px;font-weight:600}
.meal-nav-btn .meal-count{font-size:11px;opacity:.6}
.day-chips{display:flex;gap:8px;overflow-x:auto;padding:0 16px 16px;scrollbar-width:none}
.day-chips::-webkit-scrollbar{display:none}
.day-chip{flex-shrink:0;border-radius:20px;padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid #ddd;background:#fff;color:#555;white-space:nowrap}
.day-chip.active{background:#1A3A5C;color:#fff;border-color:#1A3A5C}
.day-chip.hiit{border-color:#185FA5;color:#185FA5}
.day-chip.hiit.active{background:#185FA5;color:#fff}

/* RECIPE LIST */
.recipe-list{padding:8px 16px 16px;display:flex;flex-direction:column;gap:10px}
.recipe-card{background:#fff;border-radius:var(--radius);overflow:hidden;border:1px solid #eee;cursor:pointer;transition:transform .1s}
.recipe-card:active{transform:scale(.98)}
.recipe-card-header{padding:12px 14px;display:flex;align-items:center;gap:10px}
.recipe-card-icon{width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.recipe-card-info{flex:1;min-width:0}
.recipe-card-name{font-size:14px;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recipe-card-meta{font-size:11px;color:#888;margin-top:2px}
.recipe-card-arrow{color:#ccc;font-size:16px}
.alt-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;display:inline-block;margin-bottom:6px}

/* RECIPE DETAIL */
.recipe-detail{padding:16px}
.recipe-hero{border-radius:var(--radius);padding:16px;margin-bottom:16px}
.recipe-hero-name{font-size:20px;font-weight:700;color:#fff;margin-bottom:6px}
.recipe-hero-badges{display:flex;gap:6px;flex-wrap:wrap}
.recipe-hero-badge{background:rgba(255,255,255,.25);color:#fff;font-size:11px;font-weight:500;padding:3px 9px;border-radius:10px}
.detail-section{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid #eee}
.detail-section-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.ing-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.ing-item{font-size:14px;color:#333;padding:6px 0;border-bottom:1px solid #f5f5f5;display:flex;align-items:flex-start;gap:8px}
.ing-item:last-child{border-bottom:none;padding-bottom:0}
.ing-bullet{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.step-list{list-style:none;display:flex;flex-direction:column;gap:10px}
.step-item{display:flex;gap:12px;align-items:flex-start}
.step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.step-text{font-size:14px;color:#333;line-height:1.5;padding-top:2px}
.tip-box{background:#FEF9E7;border-left:3px solid #854F0B;border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 12px}
.tip-label{font-size:10px;font-weight:700;color:#854F0B;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.tip-text{font-size:13px;color:#4A2800;line-height:1.5}

/* PASTO FILTER TABS */
.filter-tabs{display:flex;gap:6px;overflow-x:auto;padding:12px 16px 0;scrollbar-width:none}
.filter-tabs::-webkit-scrollbar{display:none}
.filter-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid #ddd;background:#fff;color:#555}
.filter-tab.active{border-width:2px}

/* FUORI CASA */
.fuori-card{background:#fff;border-radius:var(--radius);overflow:hidden;margin:0 16px 12px;border:1px solid #eee}
.fuori-header{padding:12px 16px;color:#fff;font-size:15px;font-weight:600}
.fuori-row{padding:10px 16px;border-bottom:1px solid #f5f5f5;display:flex;gap:10px}
.fuori-row:last-child{border-bottom:none}
.fuori-label{font-size:12px;font-weight:600;min-width:90px;flex-shrink:0;margin-top:1px}
.fuori-text{font-size:13px;color:#444;line-height:1.5;flex:1}
.fuori-kcal{font-size:11px;font-weight:600;color:#888;margin-top:3px}

/* FAVORITES */
.fav-btn{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.3);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.fav-empty{padding:40px 20px;text-align:center;color:#aaa}
.fav-empty-icon{font-size:48px;margin-bottom:12px}
.fav-empty-text{font-size:14px}

/* HIIT BANNER */
.hiit-banner{background:#EBF5FB;border:1px solid #85B7EB;border-radius:var(--radius-sm);padding:10px 14px;margin:0 16px 12px;font-size:13px;color:#0C447C;line-height:1.5}
.hiit-banner strong{font-weight:600}

/* MEAL SECTION HEADERS */
.meal-section-header{padding:6px 16px 2px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#fff;margin:8px 0 0}

/* SEARCH */
.search-wrap{padding:12px 16px 4px}
.search-input{width:100%;border:1.5px solid #e0e0e0;border-radius:var(--radius-sm);padding:10px 14px;font-size:15px;background:#fff;outline:none;color:#1a1a1a}
.search-input:focus{border-color:#1A3A5C}
.no-results{padding:32px 20px;text-align:center;color:#aaa;font-size:14px}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar" id="topbar">
  <button class="topbar-back" id="btn-back" style="display:none" onclick="goBack()">&#8592;</button>
  <div>
    <div class="topbar-title" id="topbar-title">Il Mio Ricettario</div>
    <div class="topbar-sub" id="topbar-sub">Dieta Mediterranea · Senza glutine · Senza lattosio</div>
  </div>
</div>

<!-- SCREENS -->
<div class="screen active" id="screen-home"></div>
<div class="screen" id="screen-list"></div>
<div class="screen" id="screen-detail"></div>
<div class="screen" id="screen-search"></div>
<div class="screen" id="screen-fav"></div>
<div class="screen" id="screen-fuori"></div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active" id="nav-home" onclick="showScreen('home')">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>

  <button class="nav-item" id="nav-list" onclick="showScreen('list')">

    Ricette
  </button>
  <button class="nav-item" id="nav-search" onclick="showScreen('search')">
    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>

  </button>
  <button class="nav-item" id="nav-fav" onclick="showScreen('fav')">

  <button class="nav-item" id="nav-fuori" onclick="showScreen('fuori')">

    Fuori
  </button>
</nav>

<script>
const MEALS = [
  { id:"col", icon:"☀️", label:"Colazione", time:"07:00", color:"#854F0B", bg:"#FEF9E7" },
  { id:"sp1", icon:"🍎", label:"Spuntino mattino", time:"10:30", color:"#1E8449", bg:"#D5F5E3" },
  { id:"pra", icon:"🍽️", label:"Pranzo", time:"13:00", color:"#1A3A5C", bg:"#D6E4F0" },
  { id:"sp2", icon:"🍵", label:"Spuntino pomeriggio", time:"17:00", color:"#0F6E56", bg:"#E1F5EE" },
  { id:"cen", icon:"🌙", label:"Cena", time:"19:30", color:"#3C3489", bg:"#EEEDFE" },
];

const DAYS = [
  { id:"lun", label:"Lunedì", short:"Lun", hiit:false },
  { id:"mar", label:"Martedì", short:"Mar 💪", hiit:true },
  { id:"mer", label:"Mercoledì", short:"Mer", hiit:false },
  { id:"gio", label:"Giovedì", short:"Gio 💪", hiit:true },
  { id:"ven", label:"Venerdì", short:"Ven", hiit:false },
  { id:"sab", label:"Sabato", short:"Sab", hiit:false },
  { id:"dom", label:"Domenica", short:"Dom", hiit:false },
];

const ALT_LABELS = ["Ricetta A", "Ricetta B", "Ricetta C"];

const RECIPES = {
  col: {
    lun:[
      { name:"Smoothie antiossidante con semi di lino", kcal:310, prep:"5 min", tag:"Anti-infiammatoria",
        ing:["200 ml latte di mandorla senza zuccheri","100 g mirtilli (freschi o surgelati)","1 banana media (120 g)","1 cucchiaio semi di lino macinati (10 g)","1 cm zenzero fresco grattugiato","Ghiaccio (facoltativo)"],
        steps:["Versare il latte di mandorla nel frullatore.","Aggiungere i mirtilli, la banana a pezzi e lo zenzero.","Unire i semi di lino macinati.","Frullare 60 secondi fino a consistenza vellutata.","Servire immediatamente."],
        tip:"I semi di lino macinati si assorbono meglio. Macinali domenica e conserva in frigo."},
      { name:"Avena fredda ai frutti rossi (overnight oats)", kcal:295, prep:"5 min + notte", tag:"Classica",
        ing:["50 g fiocchi avena s.g.","150 ml latte di mandorla","100 g frutti rossi misti","1 cucchiaino miele","20 g noci tritate","Pizzico di cannella"],
        steps:["La sera prima: mescolare avena e latte in un barattolo.","Aggiungere miele e cannella.","Coprire e tenere in frigo tutta la notte.","Al mattino aggiungere frutti rossi e noci.","Consumare freddo direttamente dal barattolo."],
        tip:"Prepara 2-3 barattoli domenica sera — colazione pronta per tutta la settimana."},
      { name:"Uova strapazzate al curcuma con pomodorini", kcal:320, prep:"8 min", tag:"Proteica",
        ing:["2 uova grandi","50 g pomodorini ciliegino","Pizzico di curcuma + pepe nero","1 cucchiaino olio EVO","Sale marino q.b.","Erba cipollina"],
        steps:["Scaldare l'olio in padella antiaderente.","Cuocere i pomodorini tagliati a metà per 2 min.","Sbattere le uova con curcuma, pepe nero e sale.","Versare sulle verdure e mescolare lentamente.","Togliere dal fuoco quando ancora morbide.","Spolverare con erba cipollina."],
        tip:"La curcuma DEVE essere abbinata al pepe nero — aumenta l'assorbimento del 2000%."},
    ],
    mar:[
      { name:"Uova strapazzate con avocado e pane saraceno", kcal:420, prep:"10 min", tag:"HIIT — rinforzata",
        ing:["3 uova (2 intere + 1 albume)","½ avocado maturo (80 g)","1 fetta pane di grano saraceno (35 g)","Pomodorini q.b.","Sale, pepe, limone","1 cucchiaino olio EVO"],
        steps:["Tostare il pane di grano saraceno.","Strapazzare le uova in padella con olio a fiamma dolce.","Schiacciare l'avocado con limone e sale.","Spalmare l'avocado sul pane tostato.","Disporre le uova accanto con i pomodorini."],
        tip:"3 uova nei giorni HIIT — non scendere sotto per il recupero muscolare."},
      { name:"Salmone affumicato su pane saraceno", kcal:380, prep:"5 min", tag:"Omega-3 al mattino",
        ing:["80 g salmone affumicato","1 fetta pane di grano saraceno (35 g)","½ cetriolo a rondelle","1 cucchiaino capperi","Succo di ½ limone","Aneto fresco o secco"],
        steps:["Tostare il pane di grano saraceno.","Disporre il salmone sul pane.","Aggiungere cetriolo, capperi.","Spruzzare con limone.","Spolverare con aneto."],
        tip:"Il salmone affumicato supporta il recupero muscolare post-HIIT grazie agli omega-3."},
      { name:"Frittata al forno con verdure e curcuma", kcal:350, prep:"15 min", tag:"Senza padella",
        ing:["3 uova grandi","50 g spinaci freschi","30 g pomodorini","Curcuma + pepe nero","Sale, olio EVO","Erbe aromatiche"],
        steps:["Preriscaldare il forno a 180°C.","Ungere uno stampo piccolo da forno.","Sbattere le uova con curcuma, pepe, sale.","Aggiungere spinaci tritati e pomodorini tagliati.","Versare nello stampo e infornare 12-14 min."],
        tip:"Si prepara domenica sera e si mangia fredda in settimana. Dura 2 giorni in frigo."},
    ],
    mer:[
      { name:"Fiocchi di avena con frutti rossi e miele", kcal:285, prep:"5 min", tag:"Anti-infiammatoria",
        ing:["50 g fiocchi avena s.g.","150 ml latte di mandorla caldo","100 g frutti rossi misti","1 cucchiaino miele","20 g noci tritate","Pizzico di cannella"],
        steps:["Scaldare il latte di mandorla.","Versare sull'avena e mescolare.","Attendere 3 minuti.","Aggiungere cannella e miele.","Completare con frutti rossi e noci."],
        tip:"La cannella abbassa l'indice glicemico del pasto — aggiungila sempre all'avena."},
      { name:"Smoothie verde con zenzero e semi", kcal:270, prep:"5 min", tag:"Detox mattutino",

      { name:"Avena salata con uova in camicia", kcal:310, prep:"10 min", tag:"Proteica e saziante",

    ],
    gio:[

      { name:"Yogurt di cocco con granola senza glutine", kcal:360, prep:"3 min", tag:"Velocissima",
        ing:["150 g yogurt di cocco naturale","40 g granola certificata s.g.","80 g mirtilli","1 cucchiaino miele","10 g semi di zucca"],
        steps:["Versare lo yogurt di cocco in una ciotola.","Aggiungere la granola.","Disporre i mirtilli sopra.","Finire con miele e semi di zucca.","Consumare subito prima che la granola si ammorbidisca."],

      { name:"Pancake di grano saraceno con frutti rossi", kcal:390, prep:"15 min", tag:"Weekend feel",

        steps:["Mescolare farina, uovo, latte e lievito fino a pastella liscia.","Scaldare padella antiaderente con spray di olio.","Versare mestoli di pastella e cuocere 2 min per lato.","Impilare i pancake.","Servire con frutti rossi e miele."],
        tip:"Farina di grano saraceno: IG basso — energy release graduale per il HIIT."},
    ],
    ven:[
      { name:"Smoothie con semi di zucca", kcal:290, prep:"5 min", tag:"Fine settimana",
        ing:["200 ml latte di mandorla","100 g frutti rossi misti","½ banana (60 g)","10 g semi di zucca","1 cm zenzero","Cubetti di ghiaccio"],
        steps:["Inserire tutti gli ingredienti nel frullatore.","Aggiungere il ghiaccio.","Frullare 60-90 secondi.","Servire in un bicchiere alto."],

      { name:"Uova in padella con spinaci e curcuma", kcal:295, prep:"8 min", tag:"Semplicissima",

      { name:"Avena con banana caramellata e noci", kcal:310, prep:"10 min", tag:"Comfort food sano",

    sab:[
      { name:"Uova strapazzate con pane di riso e frutta", kcal:300, prep:"8 min", tag:"Classica del weekend",

function isFav(key){ return favs.includes(key); }
function toggleFav(key){
  if(isFav(key)) favs = favs.filter(f=>f!==key);
  else favs.push(key);
  saveFavs();
}
function recipeKey(meal,day,idx){ return `${meal}_${day}_${idx}`; }

function showScreen(name, pushHistory=true){
  if(pushHistory && currentScreen !== name) history.push(currentScreen);
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const navMap={home:'nav-home',list:'nav-list',search:'nav-search',fav:'nav-fav',fuori:'nav-fuori'};
  if(navMap[name]) document.getElementById(navMap[name]).classList.add('active');
  currentScreen = name;
  document.getElementById('btn-back').style.display = history.length ? 'block' : 'none';
  renderScreen(name);
}

function goBack(){
  if(history.length){
    const prev = history.pop();
    showScreen(prev, false);
  }
}

function renderScreen(name){
  if(name==='home') renderHome();
  else if(name==='list') renderList();
  else if(name==='search') renderSearch();
  else if(name==='fav') renderFav();
  else if(name==='fuori') renderFuori();
}

function renderDayPreview(){
  const day = DAYS.find(d=>d.id===selectedDay);
  const el = document.getElementById('day-preview');
  if(!el) return;
  let html = '';
  if(day.hiit) html += `<div class="hiit-banner"><strong>💪 Giorno HIIT</strong> — Allenamento entro le 14:00. Pranzo rinforzato (+150 kcal). Spuntino post-allenamento obbligatorio.</div>`;
  MEALS.forEach(m=>{
    const recs = RECIPES[m.id][selectedDay];
    if(!recs) return;
    html += `<div class="meal-section-header" style="background:${m.color}">${m.icon} ${m.label} — ${m.time}</div>`;
    html += '<div class="recipe-list">';
    recs.forEach((r,i)=>{
      const key = recipeKey(m.id, selectedDay, i);
      html += recipeCardHTML(r, m, i, key, selectedDay);
    });
    html += '</div>';
  });
  el.innerHTML = html;
}

function selectDay(id){
  selectedDay = id;
  document.querySelectorAll('.day-chip').forEach(c=>{
    const d = DAYS.find(dd=>dd.id===id);
    c.classList.toggle('active', c.textContent.trim()===d.short.trim() || c.getAttribute('onclick')===`selectDay('${id}')`);
  });
  renderDayPreview();
  document.querySelectorAll('.day-chip').forEach(c=>{
    if(c.getAttribute('onclick')===`selectDay('${id}')`) c.classList.add('active');
    else c.classList.remove('active');
  });
}

function openMeal(mealId){
  selectedMeal = mealId;
  showScreen('list');
}

function renderList(){
  const s = document.getElementById('screen-list');
  const meal = MEALS.find(m=>m.id===selectedMeal) || MEALS[0];
  document.getElementById('topbar-title').textContent = meal.label;
  document.getElementById('topbar-sub').textContent = meal.time + ' · 3 alternative per ogni giorno';

  let html = `<div class="filter-tabs">
    <button class="filter-tab ${listFilter==='all'?'active':''}" style="${listFilter==='all'?`border-color:${meal.color};color:${meal.color}`:''}" onclick="setListFilter('all')">Tutti i giorni</button>
    ${DAYS.map(d=>`<button class="filter-tab ${listFilter===d.id?'active':''}" style="${listFilter===d.id?`border-color:${meal.color};color:${meal.color}`:''}" onclick="setListFilter('${d.id}')">${d.short}</button>`).join('')}
  </div>`;

  const daysToShow = listFilter==='all' ? DAYS : DAYS.filter(d=>d.id===listFilter);
  daysToShow.forEach(day=>{
    const recs = RECIPES[meal.id][day.id];
    if(!recs) return;
    if(day.hiit) html += `<div class="hiit-banner"><strong>💪 ${day.label}</strong> — Giorno HIIT, porzioni rinforzate.</div>`;
    else html += `<div style="padding:12px 16px 4px;font-size:14px;font-weight:600;color:#333">${day.label}</div>`;
    html += '<div class="recipe-list">';
    recs.forEach((r,i)=>{
      const key = recipeKey(meal.id, day.id, i);
      html += recipeCardHTML(r, meal, i, key, day.id);
    });
    html += '</div>';
  });

  s.innerHTML = html;
}

function setListFilter(f){
  listFilter = f;
  renderList();
}

function recipeCardHTML(r, meal, idx, key, dayId){
  return `
    <div class="recipe-card" onclick="openRecipe('${meal.id}','${dayId}',${idx})">
      <div class="recipe-card-header">
        <div class="recipe-card-icon" style="background:${meal.bg}">
          <span style="font-size:18px">${meal.icon}</span>
        </div>
        <div class="recipe-card-info">
          <div class="alt-badge" style="background:${meal.bg};color:${meal.color}">${ALT_LABELS[idx]}</div>
          <div class="recipe-card-name">${r.name}</div>
          <div class="recipe-card-meta">${r.kcal} kcal · ${r.prep} · ${r.tag}</div>
        </div>
        <div class="recipe-card-arrow">›</div>
      </div>
    </div>`;
}

function openRecipe(mealId, dayId, idx){
  const meal = MEALS.find(m=>m.id===mealId);
  const recipe = RECIPES[mealId][dayId][idx];
  const key = recipeKey(mealId, dayId, idx);
  const s = document.getElementById('screen-detail');
  const day = DAYS.find(d=>d.id===dayId);

  document.getElementById('topbar-title').textContent = meal.label;
  document.getElementById('topbar-sub').textContent = day.label + ' · ' + ALT_LABELS[idx];

  s.innerHTML = `
    <div class="recipe-detail">
      <div class="recipe-hero" style="background:${meal.color};position:relative">
        <div class="recipe-hero-name">${recipe.name}</div>
        <div class="recipe-hero-badges">
          <span class="recipe-hero-badge">${recipe.kcal} kcal</span>
          <span class="recipe-hero-badge">${recipe.prep}</span>
          <span class="recipe-hero-badge">${recipe.tag}</span>
        </div>
        <button class="fav-btn" onclick="event.stopPropagation();toggleFavDetail('${key}',this)">${isFav(key)?'❤️':'🤍'}</button>
      </div>
      <div class="detail-section">
        <div class="detail-section-title" style="color:${meal.color}">Ingredienti</div>
        <ul class="ing-list">
          ${recipe.ing.map(i=>`<li class="ing-item"><div class="ing-bullet" style="background:${meal.color}"></div>${i}</li>`).join('')}
        </ul>
      </div>
      <div class="detail-section">
        <div class="detail-section-title" style="color:${meal.color}">Preparazione</div>
        <ol class="step-list">
          ${recipe.steps.map((s,i)=>`<li class="step-item"><div class="step-num" style="background:${meal.color}">${i+1}</div><div class="step-text">${s}</div></li>`).join('')}
        </ol>
      </div>
      ${recipe.tip?`
      <div class="detail-section" style="padding:0">
        <div class="tip-box">
          <div class="tip-label">Consiglio</div>
          <div class="tip-text">${recipe.tip}</div>
        </div>
      </div>`:''}
    </div>
  `;
  showScreen('detail');
}

function toggleFavDetail(key, btn){
  toggleFav(key);
  btn.textContent = isFav(key)?'❤️':'🤍';
}

function renderSearch(){
  const s = document.getElementById('screen-search');
  document.getElementById('topbar-title').textContent = 'Cerca ricette';
  document.getElementById('topbar-sub').textContent = '105 ricette disponibili';
  s.innerHTML = `
    <div class="search-wrap">
      <input class="search-input" type="search" placeholder="Cerca per nome o ingrediente..." oninput="doSearch(this.value)" id="search-input">
    </div>
    <div id="search-results"><div class="no-results">Inizia a digitare per cercare...</div></div>
  `;
}

function doSearch(q){
  const res = document.getElementById('search-results');
  if(!q||q.length<2){ res.innerHTML='<div class="no-results">Inizia a digitare per cercare...</div>'; return; }
  q = q.toLowerCase();
  let found = [];
  MEALS.forEach(meal=>{
    DAYS.forEach(day=>{
      const recs = RECIPES[meal.id][day.id]||[];
      recs.forEach((r,i)=>{
        const text = (r.name+' '+(r.ing||[]).join(' ')+' '+r.tag).toLowerCase();
        if(text.includes(q)) found.push({meal,day,r,i});
      });
    });
  });
  if(!found.length){ res.innerHTML='<div class="no-results">Nessun risultato per "'+q+'"</div>'; return; }
  res.innerHTML = '<div class="recipe-list">' +
    found.map(({meal,day,r,i})=>{
      const key = recipeKey(meal.id,day.id,i);
      return `<div class="recipe-card" onclick="openRecipe('${meal.id}','${day.id}',${i})">
        <div class="recipe-card-header">
          <div class="recipe-card-icon" style="background:${meal.bg}"><span style="font-size:18px">${meal.icon}</span></div>
          <div class="recipe-card-info">
            <div class="alt-badge" style="background:${meal.bg};color:${meal.color}">${meal.label} · ${day.short}</div>
            <div class="recipe-card-name">${r.name}</div>
            <div class="recipe-card-meta">${r.kcal} kcal · ${r.prep}</div>
          </div>
          <div class="recipe-card-arrow">›</div>
        </div>
      </div>`;
    }).join('') + '</div>';
}

function renderFav(){
  const s = document.getElementById('screen-fav');
  document.getElementById('topbar-title').textContent = 'Preferiti';
  document.getElementById('topbar-sub').textContent = favs.length + ' ricette salvate';
  if(!favs.length){
    s.innerHTML = '<div class="fav-empty"><div class="fav-empty-icon">🤍</div><div class="fav-empty-text">Nessun preferito ancora.<br>Apri una ricetta e tocca il cuore.</div></div>';
    return;
  }
  let html = '<div class="recipe-list">';
  favs.forEach(key=>{
    const [mealId,dayId,idx] = key.split('_');
    const meal = MEALS.find(m=>m.id===mealId);
    const day = DAYS.find(d=>d.id===dayId);
    const r = RECIPES[mealId]?.[dayId]?.[parseInt(idx)];
    if(!meal||!day||!r) return;
    html += `<div class="recipe-card" onclick="openRecipe('${mealId}','${dayId}',${idx})">
      <div class="recipe-card-header">
        <div class="recipe-card-icon" style="background:${meal.bg}"><span style="font-size:18px">${meal.icon}</span></div>
        <div class="recipe-card-info">
          <div class="alt-badge" style="background:${meal.bg};color:${meal.color}">${meal.label} · ${day.short}</div>
          <div class="recipe-card-name">${r.name}</div>
          <div class="recipe-card-meta">${r.kcal} kcal · ${r.prep}</div>
        </div>
        <div class="recipe-card-arrow">›</div>
      </div>
    </div>`;
  });
  html += '</div>';
  s.innerHTML = html;
}

  const s = document.getElementById('screen-fuori');

}

  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(reg => reg.unregister());
  });
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}
